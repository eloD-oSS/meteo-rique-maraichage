<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#2d3b1f">
<title>Hors ligne · Maraîchage</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'IBM Plex Sans',system-ui,-apple-system,sans-serif;
  background:#f4efe4;color:#1a1f12;
  min-height:100vh;min-height:100dvh;
  display:flex;align-items:center;justify-content:center;
  padding:24px;text-align:center;
}
.wrap{max-width:320px}
.ico{font-size:64px;margin-bottom:20px;display:block;line-height:1}
h1{
  font-family:'Fraunces',Georgia,serif;
  font-size:26px;font-weight:700;color:#2d3b1f;
  margin-bottom:10px;letter-spacing:-.02em;
}
p{font-size:14px;color:rgba(26,31,18,.65);line-height:1.6;margin-bottom:24px}
a{
  display:inline-block;background:#2d3b1f;color:#f4efe4;
  padding:13px 28px;border-radius:10px;text-decoration:none;
  font-size:14px;font-weight:600;letter-spacing:.01em;
}
a:hover{background:#4a5c2f}
.hint{font-size:12px;color:rgba(26,31,18,.45);margin-top:16px;font-style:italic}
</style>
</head>
<body>
<div class="wrap" role="main">
  <span class="ico" aria-hidden="true">🌿</span>
  <h1>Pas de connexion</h1>
  <p>
    Les données météo nécessitent une connexion internet.<br>
    Les fiches légumes et le calculateur ferti restent accessibles hors ligne.
  </p>
  <a href="/meteo-rique-maraichage/">Réessayer</a>
  <p class="hint">La page se rechargera automatiquement dès que la connexion sera rétablie.</p>
</div>
<script>
  window.addEventListener('online', () => window.location.replace('/meteo-rique-maraichage/'));
</script>
</body>
</html>
